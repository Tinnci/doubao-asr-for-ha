name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: Version segment to bump automatically
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: read
  packages: read

concurrency:
  group: release-${{ github.repository }}

jobs:
  prepare-release:
    name: Prepare automatic release tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.26"

      - name: Bump version, commit, and tag
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          bump = os.environ["BUMP"]
          pyproject_path = Path("pyproject.toml")
          addon_path = Path("config.yaml")

          pyproject = pyproject_path.read_text(encoding="utf-8")
          addon = addon_path.read_text(encoding="utf-8")

          py_match = re.search(r'(?m)^version = "([0-9]+\.[0-9]+\.[0-9]+)"$', pyproject)
          addon_match = re.search(r'(?m)^version: ([0-9]+\.[0-9]+\.[0-9]+)$', addon)
          if not py_match or not addon_match:
              raise SystemExit("Could not find synchronized version fields")

          versions = {py_match.group(1), addon_match.group(1)}
          if len(versions) != 1:
              raise SystemExit(f"Version files are out of sync: {sorted(versions)}")

          major, minor, patch = (int(part) for part in versions.pop().split("."))
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          elif bump == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported bump type: {bump}")

          next_version = f"{major}.{minor}.{patch}"
          next_tag = f"v{next_version}"
          if subprocess.check_output(["git", "tag", "--list", next_tag], text=True).splitlines():
              raise SystemExit(f"Tag {next_tag} already exists")

          pyproject_path.write_text(
              re.sub(
                  r'(?m)^version = "[0-9]+\.[0-9]+\.[0-9]+"$',
                  f'version = "{next_version}"',
                  pyproject,
                  count=1,
              ),
              encoding="utf-8",
          )
          addon_path.write_text(
              re.sub(
                  r'(?m)^version: [0-9]+\.[0-9]+\.[0-9]+$',
                  f"version: {next_version}",
                  addon,
                  count=1,
              ),
              encoding="utf-8",
          )

          Path(os.environ["GITHUB_OUTPUT"]).write_text(
              f"version={next_version}\ntag={next_tag}\n",
              encoding="utf-8",
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          uv lock
          git add pyproject.toml config.yaml uv.lock
          tag="$(grep '^tag=' "${GITHUB_OUTPUT}" | cut -d= -f2)"
          git commit -m "Release ${tag}"
          git tag -a "${tag}" -m "${tag}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${tag}"

  docker:
    name: Publish Docker image
    if: ${{ always() && (github.event_name == 'push' || needs.prepare-release.result == 'success') }}
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.prepare-release.outputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        env:
          DISPATCH_TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${DISPATCH_TAG}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag and version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.version }}"
          py_version="$(python3 -c 'import re; print(re.search(r"(?m)^version = \"([0-9]+\.[0-9]+\.[0-9]+)\"$", open("pyproject.toml", encoding="utf-8").read()).group(1))')"
          addon_version="$(python3 -c 'import re; print(re.search(r"(?m)^version: ([0-9]+\.[0-9]+\.[0-9]+)$", open("config.yaml", encoding="utf-8").read()).group(1))')"
          if [[ "${py_version}" != "${addon_version}" ]]; then
            echo "pyproject ${py_version} and config.yaml ${addon_version} are out of sync" >&2
            exit 1
          fi
          if [[ "${tag}" != "${py_version}" ]]; then
            echo "Tag v${tag} does not match pyproject ${py_version} and config.yaml ${addon_version}" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/tinnci/doubao-asr-for-ha
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
